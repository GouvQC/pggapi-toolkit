# File: task-apic-backup-user-registries.yml
# Task: Cette tâche sauvegarde liste des utilisateurs

parameters:
  # URL de la composante API Connect Manager
  - name: CICD_APIC_MANAGER_URL
    type: string
  # Nom de la ressource type Organisation
  - name: CICD_APIC_RESSOURCE_ORGANIZATION_NAME
    type: string

steps:
  - task: Bash@3
    displayName: 'Sauvegarde la liste des utilisateurs'
    inputs:
      targetType: 'inline'
      script: |
        echo "================================"
        echo "Extraire les registres et les utilisateurs" 
        echo "================================"
        
        for USER_REGISTRIES in $(apic user-registries:list --server ${APIC_PLATFORM_ENDPOINT} --org ${PROVIDER_ORG} --format json --output - | jq -r '.results[].name')
        do
          echo "*** Utilisateurs dans le registre ${USER_REGISTRIES}"
          apic users:list --server ${APIC_PLATFORM_ENDPOINT} --org ${PROVIDER_ORG} --user-registry ${USER_REGISTRIES} --format json --output - | jq -r '.results[].name' > ${USER_REGISTRIES}-list-users.json
          cat ${USER_REGISTRIES}-list-users.json
        done	
      failOnStderr: true
    env:
      CLOUD_DIR: $(System.DefaultWorkingDirectory)
      APIC_PLATFORM_ENDPOINT: ${{ parameters['CICD_APIC_MANAGER_URL'] }}
      PROVIDER_ORG: ${{ parameters['CICD_APIC_RESSOURCE_ORGANIZATION_NAME'] }}
